<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>FreeLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
:root{--bg:#0a0e1a;--c1:#0f1320;--c3:#181d30;--g1:rgba(255,255,255,0.025);--g2:rgba(255,255,255,0.05);--g3:rgba(255,255,255,0.07);--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);--t1:#f0f2f8;--t2:rgba(240,242,248,0.7);--t3:rgba(240,242,248,0.42);--t4:rgba(240,242,248,0.22);--ac:#8b5cf6;--ac2:#a78bfa;--acg:rgba(139,92,246,0.08);--gn:#10b981;--rd:#ef4444;--shadow-lg:0 20px 48px rgba(0,0,0,0.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(139,92,246,0.06) 0%,transparent 65%);pointer-events:none}
.login-box{background:var(--c1);border:1px solid var(--b1);border-radius:16px;padding:40px;width:380px;max-width:90vw;box-shadow:var(--shadow-lg);position:relative;z-index:1;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 24px rgba(139,92,246,0.4)}
.logo-icon i{color:#fff;font-size:22px}
.logo h1{font-size:20px;font-weight:800;letter-spacing:-.4px}
.logo h1 em{font-style:normal;background:linear-gradient(135deg,#c4b5fd,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:12px;color:var(--t3);margin-top:4px}
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:20px}
.lang-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--b1);border-radius:8px;background:var(--g2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.lang-btn:hover{border-color:var(--ac);color:var(--ac2)}
.lang-btn i{font-size:12px}
.form{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:0}
.field label{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.field input{width:100%;padding:10px 14px;background:var(--g2)!important;border:1px solid var(--b1);border-radius:8px;color:var(--t1)!important;font-size:13px;outline:none;transition:all .25s;font-family:inherit;-webkit-box-shadow:0 0 0 30px var(--g2) inset!important;-webkit-text-fill-color:var(--t1)!important}
.field input:focus{border-color:var(--ac)!important;box-shadow:0 0 0 3px rgba(139,92,246,0.1)!important}
.field input::placeholder{color:var(--t4)!important}
.field input:-webkit-autofill,.field input:-webkit-autofill:hover,.field input:-webkit-autofill:focus{-webkit-background-clip:text;-webkit-text-fill-color:var(--t1)!important;-webkit-box-shadow:0 0 0 30px var(--g2) inset!important;transition:background-color 5000s ease-in-out 0s}
.btn{padding:11px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;font-family:inherit;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;box-shadow:0 2px 8px rgba(139,92,246,0.2);margin-top:4px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,0.4)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;display:none;align-items:center;gap:8px}
.error.show{display:flex}
.ftr{text-align:center;margin-top:20px;font-size:10px;color:var(--t4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.login-box{animation:fadeUp .4s ease-out}
    </style>
</head>
<body>
<div class="login-box">
    <div class="lang-bar">
        <button class="lang-btn" onclick="toggleLang()" id="langBtn"><i class="fas fa-globe"></i> <span id="langLabel">EN</span></button>
    </div>
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <h1><em>FreeLink</em></h1>
        <p id="logoDesc">Панель управления VPN-сервером</p>
    </div>
    <form class="form" onsubmit="doLogin(event)">
        <div class="field">
            <label id="lblUser">Логин</label>
            <input type="text" id="user" placeholder="Введите логин" autocomplete="username" autofocus>
        </div>
        <div class="field">
            <label id="lblPass">Пароль</label>
            <input type="password" id="pass" placeholder="Введите пароль" autocomplete="current-password">
        </div>
        <div class="error" id="err"><i class="fas fa-exclamation-circle"></i><span id="errMsg"></span></div>
        <button type="submit" class="btn" id="loginBtn">Войти в панель</button>
    </form>
    <div class="ftr">&copy; 2026 FreeLink</div>
</div>
<script>
const LANG_KEY='vpn_lang';
const I18N={
    desc:{ru:'Панель управления VPN-сервером',en:'VPN Server Management Panel'},
    login:{ru:'Логин',en:'Login'},
    password:{ru:'Пароль',en:'Password'},
    placeholder_user:{ru:'Введите логин',en:'Enter login'},
    placeholder_pass:{ru:'Введите пароль',en:'Enter password'},
    btn_login:{ru:'Войти в панель',en:'Sign in'},
    btn_logging:{ru:'Вход...',en:'Signing in...'},
    err_login:{ru:'Ошибка входа',en:'Login error'},
    err_network:{ru:'Ошибка сети',en:'Network error'}
};
let currentLang=localStorage.getItem(LANG_KEY)||'ru';

async function initLang(){
    try{
        const r=await fetch('/api/language');
        const d=await r.json();
        if(!localStorage.getItem(LANG_KEY)&&d.language){currentLang=d.language}
    }catch{}
    applyLang();
}

function applyLang(){
    const l=currentLang;
    document.getElementById('langLabel').textContent=l==='ru'?'EN':'RU';
    document.getElementById('logoDesc').textContent=I18N.desc[l];
    document.getElementById('lblUser').textContent=I18N.login[l];
    document.getElementById('lblPass').textContent=I18N.password[l];
    document.getElementById('user').placeholder=I18N.placeholder_user[l];
    document.getElementById('pass').placeholder=I18N.placeholder_pass[l];
    document.getElementById('loginBtn').textContent=I18N.btn_login[l];
    document.title=l==='ru'?'Вход — FreeLink':'Login — FreeLink';
}

function toggleLang(){
    currentLang=currentLang==='ru'?'en':'ru';
    localStorage.setItem(LANG_KEY,currentLang);
    applyLang();
}

async function doLogin(e){
    e.preventDefault();
    const btn=document.getElementById('loginBtn');
    const err=document.getElementById('err');
    btn.disabled=true;btn.textContent=I18N.btn_logging[currentLang];err.classList.remove('show');
    try{
        const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('user').value,password:document.getElementById('pass').value})});
        const d=await r.json();
        if(r.ok){
            if(d.token)localStorage.setItem('session_token',d.token);
            window.location.href='/'
        }
        else{document.getElementById('errMsg').textContent=d.error||I18N.err_login[currentLang];err.classList.add('show')}
    }catch{document.getElementById('errMsg').textContent=I18N.err_network[currentLang];err.classList.add('show')}
    btn.disabled=false;btn.textContent=I18N.btn_login[currentLang];
}

initLang();
</script>
</body>
</html>
