<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Вход — Hysteria 2 Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
:root{--bg:#050508;--c1:#16161f;--c2:#1e1e2a;--g1:rgba(255,255,255,.03);--g2:rgba(255,255,255,.06);--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--t1:#f8fafc;--t2:rgba(248,250,252,.7);--t3:rgba(248,250,252,.4);--t4:rgba(248,250,252,.2);--ac:#8b5cf6;--ac2:#a78bfa;--acg:rgba(139,92,246,.1);--gn:#10b981;--rd:#ef4444;--R:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(139,92,246,.06) 0%,transparent 65%);pointer-events:none}
.login-box{background:var(--c1);border:1px solid var(--b1);border-radius:16px;padding:40px;width:380px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.4);position:relative;z-index:1}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 24px rgba(139,92,246,.4)}
.logo-icon i{color:#fff;font-size:22px}
.logo h1{font-size:20px;font-weight:800;letter-spacing:-.4px}
.logo h1 em{font-style:normal;background:linear-gradient(135deg,#c4b5fd,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:12px;color:var(--t3);margin-top:4px}
.form{display:flex;flex-direction:column;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.field input{padding:11px 14px;background:var(--g1);border:1px solid var(--b1);border-radius:var(--R);color:var(--t1);font-size:13px;outline:none;transition:all .2s;font-family:inherit}
.field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(139,92,246,.1)}
.field input::placeholder{color:var(--t4)}
.btn{padding:12px;border:none;border-radius:var(--R);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;box-shadow:0 2px 12px rgba(139,92,246,.3);margin-top:4px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.4)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:var(--R);padding:10px 14px;font-size:12px;color:#fca5a5;display:none;align-items:center;gap:8px}
.error.show{display:flex}
.ftr{text-align:center;margin-top:20px;font-size:10px;color:var(--t4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.login-box{animation:fadeUp .4s ease-out}
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <h1><em>Hysteria</em> 2 Manager</h1>
        <p>Панель управления VPN-сервером</p>
    </div>
    <form class="form" onsubmit="doLogin(event)">
        <div class="field">
            <label>Логин</label>
            <input type="text" id="user" placeholder="Введите логин" autocomplete="username" autofocus>
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="pass" placeholder="Введите пароль" autocomplete="current-password">
        </div>
        <div class="error" id="err"><i class="fas fa-exclamation-circle"></i><span id="errMsg"></span></div>
        <button type="submit" class="btn" id="loginBtn">Войти в панель</button>
    </form>
    <div class="ftr">Hysteria 2 Manager &middot; Сервер: Польша</div>
</div>
<script>
async function doLogin(e){
    e.preventDefault();
    const btn=$('loginBtn');const err=$('err');
    btn.disabled=true;btn.textContent='Вход...';err.classList.remove('show');
    try{
        const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('user').value,password:$('pass').value})});
        const d=await r.json();
        if(r.ok){window.location.href='/'}
        else{$('errMsg').textContent=d.error||'Ошибка входа';err.classList.add('show')}
    }catch{$('errMsg').textContent='Ошибка сети';err.classList.add('show')}
    btn.disabled=false;btn.textContent='Войти в панель';
}
const $=id=>document.getElementById(id);
</script>
</body>
</html>
