<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy Test</title>
<link href="/web/inter.css" rel="stylesheet">
<link rel="stylesheet" href="/web/font-awesome.min.css">
<style>
body{font-family:'Inter',sans-serif;background:#0a0e1a;color:#f9fafb;padding:20px;max-width:500px;margin:0 auto}
input,textarea{width:100%;padding:10px;background:#1f2937;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f9fafb;font-size:14px;margin-bottom:10px;font-family:inherit}
label{font-size:12px;color:rgba(249,250,251,.5);margin-bottom:4px;display:block}
button{width:100%;padding:12px;background:#8b5cf6;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
button:disabled{opacity:.5}
#log{background:#111827;border-radius:8px;padding:12px;margin-top:16px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:300px;overflow-y:auto;display:none}
h2{margin-bottom:20px}
</style>
</head>
<body>
<h2>Deploy Node Test</h2>
<input type="text" id="name" placeholder="Node name (e.g. Germany)">
<input type="text" id="host" placeholder="SSH Host (IP)">
<input type="number" id="port" value="22" placeholder="SSH Port">
<input type="text" id="user" value="root" placeholder="SSH Login">
<input type="password" id="pass" placeholder="SSH Password">
<textarea id="key" rows="3" placeholder="SSH Key (optional)"></textarea>
<input type="text" id="panel" value="https://link.qmbox.ru" placeholder="Panel URL">
<button id="btn" onclick="deploy()">Deploy</button>
<div id="log"></div>
<script>
function deploy(){
    var log=document.getElementById('log');
    var btn=document.getElementById('btn');
    var name=document.getElementById('name').value;
    var host=document.getElementById('host').value;
    var port=parseInt(document.getElementById('port').value)||22;
    var user=document.getElementById('user').value;
    var pass=document.getElementById('pass').value;
    var key=document.getElementById('key').value;
    var panel=document.getElementById('panel').value;
    
    log.style.display='block';
    log.textContent='Starting deploy to '+host+'...\n';
    btn.disabled=true;
    
    fetch('/api/nodes/deploy',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:name,host:host,port:port,username:user,password:pass,key:key,panel_url:panel})
    })
    .then(function(r){return r.json()})
    .then(function(d){
        if(d.success){
            log.textContent+='SUCCESS!\nNode ID: '+d.node_id+'\nIP: '+d.ip+'\n';
            if(d.output)log.textContent+=d.output;
        }else{
            log.textContent+='ERROR: '+d.error+'\n';
            if(d.output)log.textContent+=d.output+'\n';
            if(d.stderr)log.textContent+=d.stderr+'\n';
        }
        btn.disabled=false;
    })
    .catch(function(e){
        log.textContent+='FETCH ERROR: '+e.message+'\n';
        btn.disabled=false;
    });
}
</script>
</body>
</html>
